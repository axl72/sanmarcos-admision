            <script>
                function decodeUtf8(base64) {
                    try {
                        const binaryString = atob(base64);
                        const bytes = new Uint8Array(binaryString.length);
                        for (let i = 0; i < binaryString.length; i++) {
                            bytes[i] = binaryString.charCodeAt(i);
                        }
                        return new TextDecoder('utf-8').decode(bytes);
                    } catch (e) {
                        return 'Error de Nombre';
                    }
                }

                function aplicarTabIndexTabla(tabla) {
                    if (!tabla || !tabla.table) {
                        return;
                    }

                    var node = tabla.table().node();
                    if (!node) {
                        return;
                    }

                    $(node).find('thead th').attr('tabindex', '0');
                    $(node).find('tbody tr').each(function() {
                        $(this).find('td:visible').attr('tabindex', '0');
                    });
                }

                $(document).ready(function() {
                    $('.obfuscated').each(function() {
                        var encoded = $(this).data('auth');
                        if (encoded) {
                            $(this).text(decodeUtf8(encoded));
                        }
                    });
                    
                    var tablaPostulantes = $('#tablaPostulantes').DataTable({
                        language: { url: 'https://cdn.datatables.net/plug-ins/2.0.8/i18n/es-ES.json' },
                        responsive: false,
                        ordering: false,
                        pagingType: 'simple_numbers',
                        pageLength: 50,
                        columnDefs: [ { searchable: false, targets: -1 } ]
                    });

                    aplicarTabIndexTabla(tablaPostulantes);
                    tablaPostulantes.on('draw', function() {
                        aplicarTabIndexTabla(tablaPostulantes);
                    });
                });
            </script></body></html>
